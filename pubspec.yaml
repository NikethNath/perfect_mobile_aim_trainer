name: aim_trainer
description: "Aim Ranked — minimal high-performance aim trainer."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.3.0
  flutter_displaymode: ^0.6.0
  crypto: ^3.0.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
  fonts:
    - family: ChakraPetch
      fonts:
        - asset: assets/fonts/ChakraPetch-Italic.ttf
          style: italic
        - asset: assets/fonts/ChakraPetch-SemiBoldItalic.ttf
          style: italic
          weight: 600
        - asset: assets/fonts/ChakraPetch-BoldItalic.ttf
          style: italic
          weight: 700
    - family: Rajdhani
      fonts:
        - asset: assets/fonts/Rajdhani-Medium.ttf
          weight: 500
        - asset: assets/fonts/Rajdhani-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Rajdhani-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
        - asset: assets/fonts/JetBrainsMono-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/branding/icon_fg.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/branding/splash.png"
  android_12:
    color: "#000000"
    image: "assets/branding/splash.png"
